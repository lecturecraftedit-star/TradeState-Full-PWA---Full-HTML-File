<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TradeState" />
  <title>TradeState</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0e1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; }
    textarea, input { outline: none; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { RadarChart, Radar, PolarGrid, PolarAngleAxis, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, Cell } = Recharts;

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const VIOLATIONS = ["Revenge Trade","Moved Stop Loss","Overtraded","Sized Up Emotionally","Exited Early","Other"];
const SLIDERS = ["Sleep Quality","Stress Level","Focus","Confidence","Physical Energy"];
const green = "#00ff88", navy = "#0a0e1a", card = "#111827", border = "#1f2937", muted = "#6b7280", red = "#ff4d6d";

const load = () => { try { return JSON.parse(localStorage.getItem("ts_sessions") || "[]"); } catch { return []; } };
const save = d => localStorage.setItem("ts_sessions", JSON.stringify(d));

function Slider({ label, value, onChange }) {
  const color = value >= 7 ? green : value >= 4 ? "#facc15" : red;
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
        <span style={{ color:"#d1d5db", fontSize:13 }}>{label}</span>
        <span style={{ color, fontWeight:700, fontSize:14 }}>{value}</span>
      </div>
      <input type="range" min={1} max={10} value={value} onChange={e => onChange(Number(e.target.value))}
        style={{ width:"100%", accentColor:color, cursor:"pointer" }} />
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:2 }}>
        <span style={{ color:muted, fontSize:10 }}>Low</span>
        <span style={{ color:muted, fontSize:10 }}>High</span>
      </div>
    </div>
  );
}

function Card({ children, style }) {
  return <div style={{ background:card, border:`1px solid ${border}`, borderRadius:12, padding:20, ...style }}>{children}</div>;
}

function Badge({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: active ? "#ff4d6d22" : "#1f2937", border:`1px solid ${active ? red : border}`,
      color: active ? red : muted, borderRadius:20, padding:"5px 12px", fontSize:12,
      cursor:"pointer", margin:"3px"
    }}>{label}</button>
  );
}

const initSliders = () => ({ "Sleep Quality":7, "Stress Level":5, "Focus":7, "Confidence":7, "Physical Energy":7 });

function App() {
  const [screen, setScreen] = useState("home");
  const [sessions, setSessions] = useState(load);
  const [preData, setPreData] = useState(initSliders());
  const [preNote, setPreNote] = useState("");
  const [activeSession, setActiveSession] = useState(() => { try { return JSON.parse(localStorage.getItem("ts_active") || "null"); } catch { return null; } });
  const [postData, setPostData] = useState({ outcome:"Win", pnl:"", violations:[], note:"" });

  const persist = (newSessions) => { setSessions(newSessions); save(newSessions); };

  const startSession = () => {
    const s = { id: Date.now(), timestamp: new Date().toISOString(), pre: { ...preData }, preNote };
    setActiveSession(s);
    localStorage.setItem("ts_active", JSON.stringify(s));
    setPreData(initSliders()); setPreNote("");
    setScreen("home");
  };

  const submitPost = () => {
    if (!activeSession) return;
    const completed = { ...activeSession, post: { ...postData } };
    const updated = [completed, ...sessions];
    persist(updated);
    setActiveSession(null);
    localStorage.removeItem("ts_active");
    setPostData({ outcome:"Win", pnl:"", violations:[], note:"" });
    setScreen("insights");
  };

  const toggleViolation = v => setPostData(p => ({
    ...p, violations: p.violations.includes(v) ? p.violations.filter(x => x !== v) : [...p.violations, v]
  }));

  const insights = useMemo(() => {
    const completed = sessions.filter(s => s.post);
    if (!completed.length) return null;
    const wins = completed.filter(s => s.post.outcome === "Win");
    const losses = completed.filter(s => s.post.outcome === "Loss");
    const avg = (arr, key) => arr.length ? (arr.reduce((a, s) => a + s.pre[key], 0) / arr.length).toFixed(1) : 0;
    const radarData = SLIDERS.map(k => ({ label: k.split(" ")[0], wins: parseFloat(avg(wins,k)), losses: parseFloat(avg(losses,k)) }));
    const byDay = DAYS.map((d,i) => {
      const ds = completed.filter(s => new Date(s.timestamp).getDay() === i);
      const wr = ds.length ? Math.round((ds.filter(s => s.post.outcome==="Win").length / ds.length)*100) : null;
      return { day:d, winRate:wr, count:ds.length };
    }).filter(d => d.count > 0);
    const optimalState = SLIDERS.map(k => ({ key:k, score:parseFloat(avg(wins,k)) })).sort((a,b)=>b.score-a.score).slice(0,3);
    const allV = completed.flatMap(s => s.post.violations);
    const violationCount = VIOLATIONS.map(v => ({ v, count: allV.filter(x=>x===v).length })).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
    return { radarData, byDay, optimalState, violationCount, wins:wins.length, losses:losses.length, total:completed.length };
  }, [sessions]);

  const navBtn = (label, target) => (
    <button onClick={() => setScreen(target)} style={{
      background: screen===target ? "#1f2937" : "transparent", border:"none",
      color: screen===target ? green : muted, padding:"8px 14px", borderRadius:8,
      cursor:"pointer", fontSize:13, fontWeight: screen===target ? 700 : 400
    }}>{label}</button>
  );

  return (
    <div style={{ background:navy, minHeight:"100vh", color:"#f9fafb", maxWidth:480, margin:"0 auto" }}>
      <div style={{ padding:"16px 20px 12px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`1px solid ${border}`, position:"sticky", top:0, background:navy, zIndex:100 }}>
        <div>
          <span style={{ color:green, fontWeight:800, fontSize:18, letterSpacing:1 }}>TRADE</span>
          <span style={{ color:"#f9fafb", fontWeight:800, fontSize:18 }}>STATE</span>
        </div>
        <div style={{ display:"flex", gap:2 }}>
          {navBtn("Home","home")}
          {navBtn("Insights","insights")}
          {navBtn("History","history")}
        </div>
      </div>

      <div style={{ padding:20, paddingBottom:40 }}>

        {screen==="home" && (
          <div>
            {activeSession && (
              <Card style={{ marginBottom:16, borderColor:"#facc1544", background:"#facc1508" }}>
                <div style={{ color:"#facc15", fontWeight:700, fontSize:13, marginBottom:4 }}>⚡ SESSION ACTIVE</div>
                <div style={{ color:muted, fontSize:12 }}>Started {new Date(activeSession.timestamp).toLocaleTimeString()}</div>
                <button onClick={() => setScreen("post")} style={{ marginTop:12, width:"100%", background:"#facc15", color:"#0a0e1a", border:"none", borderRadius:8, padding:10, fontWeight:700, cursor:"pointer", fontSize:14 }}>
                  Log Session Results →
                </button>
              </Card>
            )}
            <Card style={{ marginBottom:16 }}>
              <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:12 }}>PERFORMANCE SNAPSHOT</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                {[["Sessions", sessions.filter(s=>s.post).length],["Wins", sessions.filter(s=>s.post?.outcome==="Win").length],["Losses", sessions.filter(s=>s.post?.outcome==="Loss").length]].map(([l,v]) => (
                  <div key={l} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:28, fontWeight:800, color:l==="Wins"?green:l==="Losses"?red:"#f9fafb" }}>{v}</div>
                    <div style={{ color:muted, fontSize:11 }}>{l}</div>
                  </div>
                ))}
              </div>
            </Card>
            {!activeSession && (
              <button onClick={() => setScreen("pre")} style={{ width:"100%", background:green, color:"#0a0e1a", border:"none", borderRadius:10, padding:14, fontWeight:800, fontSize:16, cursor:"pointer" }}>
                START PRE-SESSION CHECK-IN
              </button>
            )}
            <button onClick={() => setScreen("history")} style={{ width:"100%", background:"transparent", color:muted, border:`1px solid ${border}`, borderRadius:10, padding:12, fontWeight:600, fontSize:14, cursor:"pointer", marginTop:10 }}>
              View Session History
            </button>
          </div>
        )}

        {screen==="pre" && (
          <div>
            <div style={{ marginBottom:20 }}>
              <div style={{ color:green, fontSize:11, letterSpacing:1, marginBottom:4 }}>PRE-SESSION CHECK-IN</div>
              <div style={{ fontWeight:700, fontSize:18 }}>How are you showing up today?</div>
            </div>
            <Card style={{ marginBottom:16 }}>
              {SLIDERS.map(k => <Slider key={k} label={k} value={preData[k]} onChange={v => setPreData(p => ({...p,[k]:v}))} />)}
            </Card>
            <Card style={{ marginBottom:16 }}>
              <div style={{ color:muted, fontSize:12, marginBottom:8 }}>Session Note (optional)</div>
              <textarea value={preNote} onChange={e => setPreNote(e.target.value)} placeholder="Market bias, news, anything on your mind..." rows={3}
                style={{ width:"100%", background:"#1f2937", border:`1px solid ${border}`, borderRadius:8, color:"#f9fafb", padding:10, fontSize:13, resize:"none" }} />
            </Card>
            <button onClick={startSession} style={{ width:"100%", background:green, color:"#0a0e1a", border:"none", borderRadius:10, padding:14, fontWeight:800, fontSize:15, cursor:"pointer" }}>
              BEGIN TRADING →
            </button>
            <button onClick={() => setScreen("home")} style={{ width:"100%", background:"transparent", color:muted, border:"none", padding:10, fontSize:13, cursor:"pointer", marginTop:6 }}>← Back</button>
          </div>
        )}

        {screen==="post" && (
          <div>
            <div style={{ marginBottom:20 }}>
              <div style={{ color:"#facc15", fontSize:11, letterSpacing:1, marginBottom:4 }}>POST-SESSION LOG</div>
              <div style={{ fontWeight:700, fontSize:18 }}>How did it go?</div>
            </div>
            <Card style={{ marginBottom:14 }}>
              <div style={{ color:muted, fontSize:12, marginBottom:10 }}>Outcome</div>
              <div style={{ display:"flex", gap:8 }}>
                {["Win","Loss","Breakeven"].map(o => (
                  <button key={o} onClick={() => setPostData(p=>({...p,outcome:o}))} style={{
                    flex:1, padding:"10px 0", borderRadius:8,
                    border:`1px solid ${postData.outcome===o?(o==="Win"?green:o==="Loss"?red:"#facc15"):border}`,
                    background: postData.outcome===o?(o==="Win"?"#00ff8811":o==="Loss"?"#ff4d6d11":"#facc1511"):"transparent",
                    color: postData.outcome===o?(o==="Win"?green:o==="Loss"?red:"#facc15"):muted,
                    fontWeight:700, cursor:"pointer", fontSize:13
                  }}>{o}</button>
                ))}
              </div>
            </Card>
            <Card style={{ marginBottom:14 }}>
              <div style={{ color:muted, fontSize:12, marginBottom:8 }}>P&L (optional)</div>
              <input value={postData.pnl} onChange={e => setPostData(p=>({...p,pnl:e.target.value}))} placeholder="e.g. +$240 or -$80"
                style={{ width:"100%", background:"#1f2937", border:`1px solid ${border}`, borderRadius:8, color:"#f9fafb", padding:10, fontSize:14 }} />
            </Card>
            <Card style={{ marginBottom:14 }}>
              <div style={{ color:muted, fontSize:12, marginBottom:10 }}>Rule Violations</div>
              <div style={{ display:"flex", flexWrap:"wrap" }}>
                {VIOLATIONS.map(v => <Badge key={v} label={v} active={postData.violations.includes(v)} onClick={() => toggleViolation(v)} />)}
              </div>
            </Card>
            <Card style={{ marginBottom:16 }}>
              <div style={{ color:muted, fontSize:12, marginBottom:8 }}>Session Note</div>
              <textarea value={postData.note} onChange={e => setPostData(p=>({...p,note:e.target.value}))} placeholder="What happened? What did you learn?" rows={3}
                style={{ width:"100%", background:"#1f2937", border:`1px solid ${border}`, borderRadius:8, color:"#f9fafb", padding:10, fontSize:13, resize:"none" }} />
            </Card>
            <button onClick={submitPost} style={{ width:"100%", background:green, color:"#0a0e1a", border:"none", borderRadius:10, padding:14, fontWeight:800, fontSize:15, cursor:"pointer" }}>
              SUBMIT SESSION →
            </button>
          </div>
        )}

        {screen==="insights" && (
          <div>
            <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:16 }}>YOUR INSIGHTS</div>
            {!insights ? (
              <Card>
                <div style={{ textAlign:"center", color:muted, padding:30 }}>
                  <div style={{ fontSize:32, marginBottom:12 }}>📊</div>
                  <div style={{ fontWeight:700, marginBottom:8 }}>No data yet</div>
                  <div style={{ fontSize:13 }}>Complete at least one full session to see your insights.</div>
                </div>
              </Card>
            ) : (
              <>
                <Card style={{ marginBottom:14 }}>
                  <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:14 }}>WIN/LOSS STATE COMPARISON</div>
                  <ResponsiveContainer width="100%" height={200}>
                    <RadarChart data={insights.radarData}>
                      <PolarGrid stroke={border} />
                      <PolarAngleAxis dataKey="label" tick={{ fill:muted, fontSize:11 }} />
                      <Radar name="Wins" dataKey="wins" stroke={green} fill={green} fillOpacity={0.15} />
                      <Radar name="Losses" dataKey="losses" stroke={red} fill={red} fillOpacity={0.15} />
                    </RadarChart>
                  </ResponsiveContainer>
                  <div style={{ display:"flex", justifyContent:"center", gap:20, marginTop:4 }}>
                    <span style={{ color:green, fontSize:12 }}>● Wins</span>
                    <span style={{ color:red, fontSize:12 }}>● Losses</span>
                  </div>
                </Card>
                <Card style={{ marginBottom:14 }}>
                  <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:6 }}>🏆 YOUR OPTIMAL TRADING STATE</div>
                  {insights.optimalState.map(({key,score}) => (
                    <div key={key} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${border}` }}>
                      <span style={{ color:"#d1d5db", fontSize:13 }}>{key}</span>
                      <span style={{ color:green, fontWeight:700 }}>{score}/10</span>
                    </div>
                  ))}
                </Card>
                {insights.byDay.length > 0 && (
                  <Card style={{ marginBottom:14 }}>
                    <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:14 }}>WIN RATE BY DAY</div>
                    <ResponsiveContainer width="100%" height={140}>
                      <BarChart data={insights.byDay}>
                        <XAxis dataKey="day" tick={{ fill:muted, fontSize:11 }} axisLine={false} tickLine={false} />
                        <YAxis hide domain={[0,100]} />
                        <Tooltip contentStyle={{ background:card, border:`1px solid ${border}`, borderRadius:8 }} formatter={v=>[`${v}%`,"Win Rate"]} />
                        <Bar dataKey="winRate" radius={4}>
                          {insights.byDay.map((d,i) => <Cell key={i} fill={d.winRate>=50?green:red} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>
                )}
                {insights.violationCount.length > 0 && (
                  <Card>
                    <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:10 }}>TOP RULE VIOLATIONS</div>
                    {insights.violationCount.map(({v,count}) => (
                      <div key={v} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:`1px solid ${border}` }}>
                        <span style={{ color:"#d1d5db", fontSize:13 }}>{v}</span>
                        <span style={{ color:red, fontWeight:700 }}>{count}x</span>
                      </div>
                    ))}
                  </Card>
                )}
              </>
            )}
          </div>
        )}

        {screen==="history" && (
          <div>
            <div style={{ color:muted, fontSize:11, letterSpacing:1, marginBottom:16 }}>SESSION HISTORY</div>
            {sessions.length===0 ? (
              <Card>
                <div style={{ textAlign:"center", color:muted, padding:30 }}>
                  <div style={{ fontSize:32, marginBottom:12 }}>📋</div>
                  <div style={{ fontWeight:700, marginBottom:8 }}>No sessions yet</div>
                </div>
              </Card>
            ) : sessions.map(s => (
              <Card key={s.id} style={{ marginBottom:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <span style={{ color:"#d1d5db", fontWeight:600, fontSize:14 }}>
                    {new Date(s.timestamp).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
                  </span>
                  {s.post ? (
                    <span style={{ color:s.post.outcome==="Win"?green:s.post.outcome==="Loss"?red:"#facc15", fontWeight:700, fontSize:13 }}>
                      {s.post.outcome}{s.post.pnl?` · ${s.post.pnl}`:""}
                    </span>
                  ) : <span style={{ color:"#facc15", fontSize:12 }}>In Progress</span>}
                </div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {SLIDERS.map(k => (
                    <div key={k} style={{ background:"#1f2937", borderRadius:6, padding:"4px 8px", fontSize:11 }}>
                      <span style={{ color:muted }}>{k.split(" ")[0]}: </span>
                      <span style={{ color:s.pre[k]>=7?green:s.pre[k]>=4?"#facc15":red, fontWeight:700 }}>{s.pre[k]}</span>
                    </div>
                  ))}
                </div>
                {s.post?.violations?.l
